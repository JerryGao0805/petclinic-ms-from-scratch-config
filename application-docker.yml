management:
  endpoints:
    web:
      exposure:
        include: health,refresh,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true
    git:
      mode: simple

info:
  config:
    version: ${config.client.version:unknown}