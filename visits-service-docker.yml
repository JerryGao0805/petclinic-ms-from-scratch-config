spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoint:
    health:
      group:
        readiness:
          include: readinessState,db

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/